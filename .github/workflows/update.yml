name: Auto Update Dashboard

on:
  schedule:
    # 台灣時間每天 06:50 啟動（UTC 22:50，前一天）→ Dashboard 約 06:51 完成
    # 之後等到 07:15 TPE 才推 Telegram
    - cron: '50 22 * * *'
    # 台灣時間每天 17:50 啟動（UTC 09:50）→ Dashboard 約 17:51 完成
    # 之後等到 18:15 TPE 才推 Telegram
    - cron: '50 9 * * *'
  workflow_dispatch:  # 可在 GitHub 介面手動觸發

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40  # 允許 sleep 等待 25 分鐘 + 其他步驟

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        working-directory: src
        run: python run_all.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP_TPE=$(TZ='Asia/Taipei' date +'%Y-%m-%d %H:%M TPE')
            git commit -m "🤖 Auto-update ${TIMESTAMP_TPE}"
            git push
          fi

      # 排程觸發時：等到指定的台灣時間（07:15 / 18:15）再推 Telegram
      # 手動觸發（workflow_dispatch）跳過等待，立即推
      - name: Wait until Telegram push time (TPE 07:15 or 18:15)
        if: github.event_name == 'schedule'
        run: |
          if [[ "${{ github.event.schedule }}" == "50 22 * * *" ]]; then
            TARGET_HM="07:15"
          else
            TARGET_HM="18:15"
          fi
          NOW_EPOCH=$(TZ='Asia/Taipei' date +%s)
          TARGET_EPOCH=$(TZ='Asia/Taipei' date -d "today $TARGET_HM" +%s)
          NOW_TPE=$(TZ='Asia/Taipei' date +'%Y-%m-%d %H:%M:%S')
          echo "Now (TPE): $NOW_TPE"
          echo "Target: $TARGET_HM TPE"
          if [ $NOW_EPOCH -lt $TARGET_EPOCH ]; then
            SLEEP=$((TARGET_EPOCH - NOW_EPOCH))
            echo "Sleeping ${SLEEP}s..."
            sleep $SLEEP
          else
            echo "Already past target time, sending immediately"
          fi

      - name: Send Telegram brief
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        working-directory: src
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_telegram.py
