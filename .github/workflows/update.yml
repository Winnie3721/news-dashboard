name: Auto Update Dashboard

on:
  schedule:
    # 台灣時間每天 06:55 (UTC 22:55, 前一天) → 訊息約 07:00 TPE 抵達
    - cron: '55 22 * * *'
    # 台灣時間每天 17:55 (UTC 09:55) → 訊息約 18:00 TPE 抵達
    - cron: '55 9 * * *'
  workflow_dispatch:  # 可在 GitHub 介面手動觸發

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        working-directory: src
        run: python run_all.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP_TPE=$(TZ='Asia/Taipei' date +'%Y-%m-%d %H:%M TPE')
            git commit -m "🤖 Auto-update ${TIMESTAMP_TPE}"
            git push
          fi

      # 早上 06:50 + 晚上 18:00 排程，以及任何手動觸發 → 推 Telegram
      # send_telegram.py 會依當下時間自動切換早安/晚安問候
      - name: Send Telegram brief
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        working-directory: src
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_telegram.py
